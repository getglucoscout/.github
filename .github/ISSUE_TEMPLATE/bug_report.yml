name: Bug report
description: Report a defect or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release, tag, or commit SHA where you saw this.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime, hardware, or deployment details relevant to the issue.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Scrub secrets, real IPs, and hostnames before pasting.
      render: shell
